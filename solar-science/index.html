<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🪐 Cosmic Match & Drop!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght=700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="space-bg"></div>
  <div class="solar-flares"></div>
  <div class="space-dust"></div>
  <div class="feedback-pop" id="feedback-pop">🎉</div>
  <div class="streak-pop" id="streak-pop"><span class="sn" id="streak-num">3</span>🔥 Streak!</div>

  <div class="screen active" id="start">
    <div class="logo">🪐 Solar<br>Match & Drop!</div>
    <div class="sub">Drag the space data card into the matching planetary slot! 🚀</div>
    <div class="start-card">
      <h2>Choose your orbit depth 🔭</h2>
      <div class="level-btns">
        <button class="lvl-btn" data-lv="1" onclick="pickLevel(1)">
          <span class="lv-icon">🌍</span><span>Inner Ring</span>
          <span style="font-size:0.7rem;color:rgba(255,230,200,0.5);font-weight:700">Easy<br>Basics</span>
        </button>
        <button class="lvl-btn picked" data-lv="2" onclick="pickLevel(2)">
          <span class="lvl-btn-icon lv-icon">🪐</span><span>Outer Ring</span>
          <span style="font-size:0.7rem;color:rgba(255,230,200,0.5);font-weight:700">Medium<br>Structures</span>
        </button>
        <button class="lvl-btn" data-lv="3" onclick="pickLevel(3)">
          <span class="lv-icon">☀️</span><span>Deep Core</span>
          <span style="font-size:0.7rem;color:rgba(255,230,200,0.5);font-weight:700">Hard<br>Physics</span>
        </button>
      </div>
      <div class="sound-row">
        <button class="sound-toggle" id="sound-btn" onclick="toggleSound()">🔊 Sound ON</button>
      </div>
      <button class="btn-play" onclick="startGame()">🚀 Launch Mission!</button>
    </div>
  </div>

  <div class="screen" id="game">
    <div class="hud">
      <div class="hud-item">⭐ <span id="hud-score">0</span></div>
      <div class="hud-item">Matches <span id="hud-q">1</span>/5</div>
      <div class="hud-item">❤️ <span id="hud-lives">❤️❤️❤️</span></div>
    </div>
    
    <div class="timer-wrap">
      <div class="timer-fill" id="timer-fill" style="width:100%"></div>
    </div>

    <div class="drag-container">
      <p style="font-size: 0.85rem; color: var(--orange); font-weight: 800; margin-bottom: 5px;">DRAG THIS CARD 👇</p>
      <div class="q-card draggable-card" id="draggable-card" draggable="true">
        <div class="q-badge" id="q-badge">Telemetry 🪐</div>
        <div class="q-text" id="q-text">Loading item...</div>
      </div>
    </div>

    <div class="dropzone-grid" id="dropzone-grid"></div>
  </div>

  <div class="screen" id="win">
    <div class="win-card">
      <div class="win-trophy" id="win-trophy">🏆</div>
      <div class="win-title" id="win-title">Incredible!</div>
      <div class="win-sub" id="win-sub">You matched all celestial points!</div>
      <div class="win-stars" id="win-stars">⭐⭐⭐</div>
      <div class="stats-row">
        <div class="stat-box"><span class="sv sv-orange" id="ws-c">0</span><span class="sl">Correct</span></div>
        <div class="stat-box"><span class="sv sv-coral" id="ws-w">0</span><span class="sl">Wrong</span></div>
        <div class="stat-box"><span class="sv sv-gold" id="ws-s">0</span><span class="sl">Score</span></div>
      </div>
      <button class="btn-again" onclick="startGame()">🚀 Fly Again!</button>
      <button class="btn-menu" onclick="showMenu()">Back to Control Room</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
